name: Validate Quartz 5 Prep

on:
  push:
    branches:
      - v5
  pull_request:
    branches:
      - v5
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-quartz-plugins-${{ hashFiles('quartz.config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-quartz-plugins-

      - name: Install dependencies
        run: npm ci

      - name: Install Quartz plugins
        run: npx quartz plugin install --from-config

      - name: Run checks
        run: npm run check

      - name: Build Quartz
        run: npx quartz build
