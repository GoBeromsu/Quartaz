# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: Beomsu Koh
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics:
    provider: google
    tagId: G-P07C416MPF
  locale: en-US
  baseUrl: berom.net
  ignorePatterns:
    - .git
    - .gitignore
    - .obsidian
    - "**/*.pdf"
    - "**/*.canvas"
    - "**/private/*"
    - .smart-env
    - 50. Calendar
    - 70. Settings
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Inter
      body: Inter
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#ffffff"
        lightgray: "#f0f0f0"
        gray: "#b0b0b0"
        darkgray: "#4e4e4e"
        dark: "#1a1a1a"
        secondary: "#a52142"
        tertiary: "#c75b75"
        highlight: "rgba(165, 33, 66, 0.08)"
        textHighlight: "#fff23688"
      darkMode:
        light: "#262626"
        lightgray: "#3a3a3a"
        gray: "#646464"
        darkgray: "#d4d4d4"
        dark: "#ebebec"
        secondary: "#c75b75"
        tertiary: "#a52142"
        highlight: "rgba(165, 33, 66, 0.12)"
        textHighlight: "#b3aa0288"
plugins:
  - source: ./plugins/legacy-frontmatter-dates
    enabled: true
    order: 5
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: false
      delimiters: "---"
      language: yaml
    order: 6
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: created
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/page-title
    enabled: true
  - source: github:quartz-community/search
    enabled: true
  - source: github:quartz-community/darkmode
    enabled: true
  - source: github:quartz-community/breadcrumbs
    enabled: true
  - source: github:quartz-community/article-title
    enabled: true
  - source: github:quartz-community/content-meta
    enabled: true
  - source: github:quartz-community/tag-list
    enabled: true
  - source: github:quartz-community/comments
    enabled: true
layout:
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content:
      template: full-width
      positions:
        left: []
        right: []
    folder:
      template: full-width
      positions:
        left: []
        right: []
    tag:
      template: full-width
      positions:
        left: []
        right: []
